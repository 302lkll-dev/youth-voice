<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청년보이스 🎙️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'custom-cyan': '#00B5E2', // 요청하신 색상 추가
                    }
                }
            }
        }
    </script>
    <style>
        /* 추가적인 CSS 스타일링 */
        .cyan-text { color: #00B5E2; }
        .cyan-bg { background-color: #00B5E2; }
        .cyan-border { border-color: #00B5E2; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-xl mx-auto py-12 px-4">
        <div class="text-center mb-10">
            <img src="logo.png" alt="청년보이스 로고" class="mx-auto mb-4 w-24 h-auto">
            <h1 class="text-4xl font-black mb-2 cyan-text">청년보이스</h1> <p class="text-gray-500 font-medium">우리의 목소리가 정책이 됩니다.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="cyan-text text-2xl">📢</span> 오늘의 주제
            </h2>
            <p class="text-gray-700 leading-relaxed">
                "청년들을 위한 가장 필요한 정책은 무엇일까요? 자유롭게 의견을 남겨주세요."
            </p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <textarea id="commentInput" 
                class="w-full h-24 p-4 border rounded-xl focus:ring-2 focus:cyan-border focus:ring-opacity-50 outline-none resize-none transition"
                placeholder="따뜻한 댓글을 남겨주세요..."></textarea> <button id="submitBtn" 
                class="w-full mt-3 text-white py-3 rounded-xl font-bold transition cyan-bg hover:bg-cyan-600">
                댓글 등록하기
            </button> </div>

        <div id="commentList" class="space-y-4">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
